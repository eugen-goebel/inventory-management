name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Ruff
        working-directory: backend
        run: pip install -r requirements-dev.txt

      - name: Ruff lint
        working-directory: backend
        run: ruff check .

      - name: Ruff format check
        working-directory: backend
        run: ruff format --check .

  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-dev.txt

      - name: Run tests with coverage
        working-directory: backend
        run: pytest -v --cov=agents --cov=db --cov=models --cov-report=term-missing --cov-report=xml --cov-fail-under=85

      - name: Coverage summary
        if: always() && matrix.python-version == '3.12'
        working-directory: backend
        run: |
          echo "### Coverage" >> "$GITHUB_STEP_SUMMARY"
          python -c "import xml.etree.ElementTree as ET; print(f\"Line coverage: {float(ET.parse('coverage.xml').getroot().get('line-rate'))*100:.1f}%\")" >> "$GITHUB_STEP_SUMMARY"

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: frontend
        run: npm install

      - name: Run tests
        working-directory: frontend
        run: npm test

      - name: Build
        working-directory: frontend
        run: npm run build

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Build and start the stack
        run: docker compose up -d --build

      - name: Wait for the API through the frontend proxy
        run: |
          for i in $(seq 1 40); do
            if curl -fsS http://localhost:8080/api/health >/dev/null; then echo "stack is up"; exit 0; fi
            sleep 3
          done
          echo "stack did not become healthy"
          docker compose logs
          exit 1

      - name: Check the frontend serves the app
        run: curl -fsS http://localhost:8080/ | grep -qi "<!doctype html"

      - name: Tear down
        if: always()
        run: docker compose down
